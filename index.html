<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kalkulator Rata-rata Rapor</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
      :root {
        --bg-color: #1a1730;
        --card-bg: #2a2645;
        --card-hover: #322d52;
        --primary-color: #9d4edd;
        --primary-hover: #7b2cbf;
        --secondary-color: #3d3866;
        --text-main: #ffffff;
        --text-muted: #a09db0;
        --danger: #ff4d4d;
        --danger-hover: #e63946;
        --success: #4ade80;
        --warning: #f59e0b;
        --border-color: #484375;
        --border-radius: 12px;
        --transition: all 0.3s ease;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: "Inter", sans-serif;
      }

      body {
        background-color: var(--bg-color);
        color: var(--text-main);
        line-height: 1.6;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      h1,
      h2,
      h3 {
        font-weight: 600;
      }

      /* ── Navbar ── */
      nav {
        background-color: var(--card-bg);
        padding: 0.85rem 1rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid var(--border-color);
        position: sticky;
        top: 0;
        z-index: 100;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        gap: 0.75rem;
      }

      nav h1 {
        font-size: 1.1rem;
        color: var(--primary-color);
        white-space: nowrap;
        flex-shrink: 0;
      }

      /* ── Buttons ── */
      button {
        cursor: pointer;
        border: none;
        border-radius: 8px;
        padding: 0.5rem 0.9rem;
        font-weight: 500;
        font-size: 0.85rem;
        transition: var(--transition);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.4rem;
        white-space: nowrap;
        -webkit-tap-highlight-color: transparent;
      }

      .btn-primary {
        background-color: var(--primary-color);
        color: white;
      }
      .btn-primary:hover {
        background-color: var(--primary-hover);
      }

      .btn-secondary {
        background-color: var(--secondary-color);
        color: white;
      }
      .btn-secondary:hover {
        background-color: var(--border-color);
      }

      .btn-danger {
        background-color: transparent;
        color: var(--danger);
        border: 1px solid var(--danger);
        padding: 0.4rem 0.7rem;
      }
      .btn-danger:hover {
        background-color: var(--danger);
        color: white;
      }

      .btn-icon {
        padding: 0.4rem;
        border-radius: 6px;
        min-width: 34px;
        min-height: 34px;
      }

      /* ── Main ── */
      main {
        padding: 1.25rem 1rem;
        flex-grow: 1;
        max-width: 1200px;
        margin: 0 auto;
        width: 100%;
      }

      .view-section {
        display: none;
        animation: fadeIn 0.3s ease;
      }
      .view-section.active {
        display: block;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* ── Semesters Grid ── */
      .semesters-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(min(100%, 340px), 1fr));
        gap: 1rem;
        margin-bottom: 1.5rem;
      }

      /* ── Semester Card ── */
      .semester-card {
        background-color: var(--card-bg);
        border-radius: var(--border-radius);
        padding: 1.1rem;
        border: 1px solid var(--border-color);
        display: flex;
        flex-direction: column;
      }

      .semester-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 0.85rem;
        gap: 0.75rem;
      }

      .semester-title-input {
        background: transparent;
        border: none;
        color: var(--text-main);
        font-size: 1.1rem;
        font-weight: 600;
        width: 100%;
        border-bottom: 1px solid transparent;
        padding-bottom: 2px;
        transition: var(--transition);
        min-width: 0;
      }
      .semester-title-input:focus {
        outline: none;
        border-bottom-color: var(--primary-color);
      }

      .semester-actions {
        display: flex;
        gap: 0.4rem;
        flex-shrink: 0;
      }

      .semester-stats {
        background-color: rgba(0, 0, 0, 0.2);
        padding: 0.7rem 0.85rem;
        border-radius: 8px;
        margin-bottom: 0.85rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border: 1px solid var(--secondary-color);
      }

      .avg-display {
        font-size: 1.4rem;
        font-weight: 700;
        color: var(--primary-color);
      }

      /* ── Subjects ── */
      .subjects-list {
        flex-grow: 1;
        display: flex;
        flex-direction: column;
        gap: 0.65rem;
        margin-bottom: 0.85rem;
      }

      .subject-row {
        display: grid;
        grid-template-columns: 1fr 80px 36px;
        gap: 0.4rem;
        align-items: center;
      }

      input[type="text"],
      input[type="number"] {
        background-color: rgba(0, 0, 0, 0.2);
        border: 1px solid var(--border-color);
        color: var(--text-main);
        padding: 0.55rem 0.6rem;
        border-radius: 6px;
        font-size: 0.875rem;
        transition: var(--transition);
        width: 100%;
        min-width: 0;
      }
      input[type="text"]:focus,
      input[type="number"]:focus {
        outline: none;
        border-color: var(--primary-color);
      }

      /* hide number spinners */
      input[type="number"]::-webkit-inner-spin-button,
      input[type="number"]::-webkit-outer-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }
      input[type="number"] {
        -moz-appearance: textfield;
        text-align: center;
      }

      input.invalid {
        border-color: var(--danger) !important;
      }

      /* ── Summary Stats ── */
      .summary-stats-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 0.85rem;
        margin-bottom: 1.5rem;
      }

      .stat-card {
        background-color: var(--card-bg);
        padding: 1.1rem;
        border-radius: var(--border-radius);
        text-align: center;
        border: 1px solid var(--border-color);
      }
      .stat-card h3 {
        font-size: 0.78rem;
        color: var(--text-muted);
        margin-bottom: 0.4rem;
        line-height: 1.3;
      }
      .stat-card .value {
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--text-main);
        word-break: break-word;
        line-height: 1.2;
      }
      .stat-card .value.success {
        color: var(--success);
      }
      .stat-card .value.danger {
        color: var(--danger);
      }

      /* ── Charts ── */
      .charts-container {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
        margin-bottom: 1.5rem;
      }

      .chart-card {
        background-color: var(--card-bg);
        padding: 1.1rem;
        border-radius: var(--border-radius);
        border: 1px solid var(--border-color);
        min-width: 0;
      }
      .chart-card h3 {
        margin-bottom: 0.75rem;
        font-size: 0.95rem;
      }
      .chart-card select {
        background-color: var(--bg-color);
        color: var(--text-main);
        border: 1px solid var(--border-color);
        padding: 0.45rem 0.5rem;
        border-radius: 6px;
        margin-bottom: 0.75rem;
        width: 100%;
        font-size: 0.85rem;
      }

      /* ── Table ── */
      .table-container {
        background-color: var(--card-bg);
        border-radius: var(--border-radius);
        border: 1px solid var(--border-color);
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        text-align: left;
        min-width: 280px;
      }
      th,
      td {
        padding: 0.85rem 1rem;
        border-bottom: 1px solid var(--border-color);
        font-size: 0.875rem;
      }
      th {
        background-color: rgba(0, 0, 0, 0.2);
        color: var(--text-muted);
        font-weight: 500;
      }
      tr:last-child td {
        border-bottom: none;
      }
      tr:hover td {
        background-color: rgba(255, 255, 255, 0.02);
      }

      /* ── Empty State ── */
      .empty-state {
        text-align: center;
        padding: 2.5rem 1.5rem;
        color: var(--text-muted);
        background: var(--card-bg);
        border-radius: var(--border-radius);
        border: 1px dashed var(--border-color);
      }

      /* ── Add Semester Button ── */
      .add-semester-wrap {
        text-align: center;
        margin-top: 0.5rem;
      }

      /* ── RESPONSIVE BREAKPOINTS ── */

      /* Tablet and below */
      @media (max-width: 768px) {
        .charts-container {
          grid-template-columns: 1fr;
        }
      }

      /* Mobile */
      @media (max-width: 480px) {
        nav {
          padding: 0.75rem;
        }
        nav h1 {
          font-size: 1rem;
        }

        main {
          padding: 0.85rem 0.75rem;
        }

        .semesters-grid {
          grid-template-columns: 1fr;
          gap: 0.85rem;
        }

        .summary-stats-grid {
          grid-template-columns: 1fr 1fr;
          gap: 0.65rem;
        }

        .stat-card {
          padding: 0.85rem 0.65rem;
        }
        .stat-card .value {
          font-size: 1.15rem;
        }
        .stat-card h3 {
          font-size: 0.72rem;
        }

        .subject-row {
          grid-template-columns: 1fr 72px 34px;
          gap: 0.35rem;
        }

        input[type="text"],
        input[type="number"] {
          padding: 0.5rem;
          font-size: 0.82rem;
        }

        .semester-title-input {
          font-size: 1rem;
        }
        .avg-display {
          font-size: 1.25rem;
        }

        button {
          font-size: 0.82rem;
          padding: 0.5rem 0.75rem;
        }
        .btn-icon {
          padding: 0.35rem;
          min-width: 32px;
          min-height: 32px;
        }

        th,
        td {
          padding: 0.7rem 0.75rem;
          font-size: 0.82rem;
        }
      }

      /* Very small screens */
      @media (max-width: 360px) {
        .subject-row {
          grid-template-columns: 1fr 64px 30px;
        }
        .summary-stats-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <nav>
      <h1>🎓 Kalkulator Rapor</h1>
      <button id="navBtn" class="btn-primary" onclick="toggleView()">
        <svg
          width="16"
          height="16"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"
          ></path>
        </svg>
        Lihat Summary
      </button>
    </nav>

    <main>
      <!-- INPUT VIEW -->
      <section id="inputView" class="view-section active">
        <div id="semestersContainer" class="semesters-grid"></div>
        <div class="add-semester-wrap">
          <button
            class="btn-primary"
            style="padding: 0.75rem 1.75rem; font-size: 1rem"
            onclick="addSemester()"
          >
            + Tambah Semester Baru
          </button>
        </div>
      </section>

      <!-- SUMMARY VIEW -->
      <section id="summaryView" class="view-section">
        <div id="summaryContent">
          <div class="summary-stats-grid">
            <div class="stat-card">
              <h3>Rata-rata Keseluruhan</h3>
              <div id="statOverallAvg" class="value primary">-</div>
            </div>
            <div class="stat-card">
              <h3>Total Mata Pelajaran</h3>
              <div id="statTotalSubjects" class="value">-</div>
            </div>
            <div class="stat-card">
              <h3>Semester Terbaik</h3>
              <div id="statBestSem" class="value success">-</div>
            </div>
            <div class="stat-card">
              <h3>Semester Terburuk</h3>
              <div id="statWorstSem" class="value danger">-</div>
            </div>
          </div>

          <div class="charts-container">
            <div class="chart-card">
              <h3>Tren Rata-rata Keseluruhan</h3>
              <canvas id="overallChart"></canvas>
            </div>
            <div class="chart-card">
              <h3>Detail per Semester</h3>
              <select
                id="semesterSelectChart"
                onchange="updateSemesterChart()"
              ></select>
              <canvas id="semesterChart"></canvas>
            </div>
          </div>

          <div class="table-container">
            <table>
              <thead>
                <tr>
                  <th>Nama Semester</th>
                  <th>Total Matpel Terisi</th>
                  <th>Rata-rata</th>
                </tr>
              </thead>
              <tbody id="summaryTableBody"></tbody>
            </table>
          </div>
        </div>
        <div id="summaryEmptyState" class="empty-state" style="display: none">
          <h2>Belum ada data</h2>
          <p>Silakan kembali dan masukkan nilai semester terlebih dahulu.</p>
        </div>
      </section>
    </main>

    <script>
      let semesters = [];
      let currentView = "input";
      let overallChartInstance = null;
      let semesterChartInstance = null;

      const generateId = () => Math.random().toString(36).substr(2, 9);

      Chart.defaults.color = "#A09DB0";
      Chart.defaults.borderColor = "#3D3866";
      Chart.defaults.font.family = "Inter";

      function init() {
        if (semesters.length === 0) addSemester("Semester 1");
      }

      function addSemester(defaultName = null) {
        const num = semesters.length + 1;
        semesters.push({
          id: generateId(),
          name: defaultName || `Semester ${num}`,
          subjects: [{ id: generateId(), name: "", grade: "" }],
        });
        renderInputView();
      }

      function deleteSemester(semesterId) {
        if (confirm("Yakin ingin menghapus semester ini?")) {
          semesters = semesters.filter((s) => s.id !== semesterId);
          renderInputView();
        }
      }

      function duplicateSemester(semesterId) {
        const original = semesters.find((s) => s.id === semesterId);
        if (!original) return;
        semesters.push({
          id: generateId(),
          name: `${original.name} (Copy)`,
          subjects: original.subjects.map((sub) => ({
            id: generateId(),
            name: sub.name,
            grade: "",
          })),
        });
        renderInputView();
      }

      function updateSemesterName(semesterId, newName) {
        const semester = semesters.find((s) => s.id === semesterId);
        if (semester) semester.name = newName;
      }

      function addSubject(semesterId) {
        const semester = semesters.find((s) => s.id === semesterId);
        if (semester) {
          semester.subjects.push({ id: generateId(), name: "", grade: "" });
          renderInputView();
        }
      }

      function deleteSubject(semesterId, subjectId) {
        const semester = semesters.find((s) => s.id === semesterId);
        if (semester) {
          semester.subjects = semester.subjects.filter(
            (sub) => sub.id !== subjectId,
          );
          renderInputView();
        }
      }

      function handleInput(semesterId, subjectId, field, value, element) {
        const semester = semesters.find((s) => s.id === semesterId);
        if (!semester) return;
        const subject = semester.subjects.find((sub) => sub.id === subjectId);
        if (!subject) return;

        if (field === "grade") {
          let numVal = parseFloat(value);
          if (value !== "" && (isNaN(numVal) || numVal < 0 || numVal > 100)) {
            element.classList.add("invalid");
          } else {
            element.classList.remove("invalid");
          }
          subject.grade = value;
        } else {
          subject.name = value;
        }
        updateSemesterStatsDOM(semesterId);
      }

      function calculateSemesterData(semester) {
        let totalGrade = 0,
          validSubjectCount = 0;
        semester.subjects.forEach((sub) => {
          let val = parseFloat(sub.grade);
          if (!isNaN(val) && val >= 0 && val <= 100 && sub.grade !== "") {
            totalGrade += val;
            validSubjectCount++;
          }
        });
        return {
          average: validSubjectCount > 0 ? totalGrade / validSubjectCount : 0,
          count: validSubjectCount,
        };
      }

      function calculateOverallStats() {
        let totalAverages = 0,
          totalValidSemesters = 0,
          absoluteTotalSubjects = 0;
        let bestSem = null,
          worstSem = null;

        const semesterStats = semesters
          .map((sem) => {
            const stat = calculateSemesterData(sem);
            absoluteTotalSubjects += stat.count;
            return { id: sem.id, name: sem.name, ...stat };
          })
          .filter((s) => s.count > 0);

        if (semesterStats.length > 0) {
          semesterStats.forEach((stat) => {
            totalAverages += stat.average;
            totalValidSemesters++;
            if (!bestSem || stat.average > bestSem.average) bestSem = stat;
            if (!worstSem || stat.average < worstSem.average) worstSem = stat;
          });
        }

        return {
          overallAvg:
            totalValidSemesters > 0 ? totalAverages / totalValidSemesters : 0,
          totalSubjects: absoluteTotalSubjects,
          bestSem,
          worstSem,
          list: semesterStats,
        };
      }

      function updateSemesterStatsDOM(semesterId) {
        const semester = semesters.find((s) => s.id === semesterId);
        if (!semester) return;
        const stats = calculateSemesterData(semester);
        const avgDisplay = document.getElementById(`avg-${semesterId}`);
        const countDisplay = document.getElementById(`count-${semesterId}`);
        if (avgDisplay) avgDisplay.innerText = stats.average.toFixed(2);
        if (countDisplay) countDisplay.innerText = `${stats.count} Terisi`;
      }

      function renderInputView() {
        const container = document.getElementById("semestersContainer");
        container.innerHTML = "";

        if (semesters.length === 0) {
          container.innerHTML = `<div class="empty-state" style="grid-column:1/-1">Belum ada semester. Klik "Tambah Semester Baru" untuk mulai.</div>`;
          return;
        }

        semesters.forEach((sem) => {
          const stats = calculateSemesterData(sem);
          let subjectsHTML = "";
          sem.subjects.forEach((sub) => {
            let numVal = parseFloat(sub.grade);
            let isInvalid =
              sub.grade !== "" && (isNaN(numVal) || numVal < 0 || numVal > 100);
            subjectsHTML += `
              <div class="subject-row">
                <input type="text" class="subject-name" placeholder="Nama Mapel"
                  value="${sub.name}"
                  oninput="handleInput('${sem.id}','${sub.id}','name',this.value,this)">
                <input type="number" step="0.01" class="subject-grade ${isInvalid ? "invalid" : ""}" placeholder="Nilai"
                  value="${sub.grade}"
                  oninput="handleInput('${sem.id}','${sub.id}','grade',this.value,this)">
                <button class="btn-danger btn-icon" onclick="deleteSubject('${sem.id}','${sub.id}')" title="Hapus Mapel" aria-label="Hapus Mapel">
                  <svg width="15" height="15" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                </button>
              </div>`;
          });

          container.insertAdjacentHTML(
            "beforeend",
            `
            <div class="semester-card" id="card-${sem.id}">
              <div class="semester-header">
                <input type="text" class="semester-title-input" value="${sem.name}"
                  onchange="updateSemesterName('${sem.id}',this.value)" placeholder="Nama Semester">
                <div class="semester-actions">
                  <button class="btn-secondary btn-icon" onclick="duplicateSemester('${sem.id}')" title="Duplikat" aria-label="Duplikat Semester">
                    <svg width="15" height="15" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                  </button>
                  <button class="btn-danger btn-icon" onclick="deleteSemester('${sem.id}')" title="Hapus Semester" aria-label="Hapus Semester">
                    <svg width="15" height="15" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                  </button>
                </div>
              </div>
              <div class="semester-stats">
                <div>
                  <span style="font-size:0.75rem;color:var(--text-muted);display:block;">Rata-rata</span>
                  <span class="avg-display" id="avg-${sem.id}">${stats.average.toFixed(2)}</span>
                </div>
                <span style="font-size:0.8rem;color:var(--text-muted);" id="count-${sem.id}">${stats.count} Terisi</span>
              </div>
              <div class="subjects-list">${subjectsHTML}</div>
              <button class="btn-secondary" style="width:100%;margin-top:auto;" onclick="addSubject('${sem.id}')">
                + Tambah Mapel
              </button>
            </div>`,
          );
        });
      }

      function renderSummaryView() {
        const stats = calculateOverallStats();
        if (stats.totalSubjects === 0) {
          document.getElementById("summaryContent").style.display = "none";
          document.getElementById("summaryEmptyState").style.display = "block";
          return;
        }
        document.getElementById("summaryContent").style.display = "block";
        document.getElementById("summaryEmptyState").style.display = "none";

        document.getElementById("statOverallAvg").innerText =
          stats.overallAvg.toFixed(2);
        document.getElementById("statTotalSubjects").innerText =
          stats.totalSubjects;
        document.getElementById("statBestSem").innerText = stats.bestSem
          ? `${stats.bestSem.average.toFixed(2)} (${stats.bestSem.name})`
          : "-";
        document.getElementById("statWorstSem").innerText = stats.worstSem
          ? `${stats.worstSem.average.toFixed(2)} (${stats.worstSem.name})`
          : "-";

        const tbody = document.getElementById("summaryTableBody");
        tbody.innerHTML = "";
        semesters.forEach((sem) => {
          const sData = calculateSemesterData(sem);
          tbody.innerHTML += `
            <tr>
              <td>${sem.name}</td>
              <td>${sData.count}</td>
              <td style="font-weight:600;color:${sData.count > 0 ? "var(--primary-color)" : "inherit"}">${sData.average.toFixed(2)}</td>
            </tr>`;
        });

        const validSemesters = stats.list;
        const ctxOverall = document
          .getElementById("overallChart")
          .getContext("2d");
        if (overallChartInstance) overallChartInstance.destroy();
        overallChartInstance = new Chart(ctxOverall, {
          type: "line",
          data: {
            labels: validSemesters.map((s) => s.name),
            datasets: [
              {
                label: "Rata-rata Semester",
                data: validSemesters.map((s) => s.average.toFixed(2)),
                borderColor: "#9D4EDD",
                backgroundColor: "rgba(157,78,221,0.2)",
                borderWidth: 3,
                pointBackgroundColor: "#FFFFFF",
                pointRadius: 4,
                fill: true,
                tension: 0.3,
              },
            ],
          },
          options: {
            responsive: true,
            plugins: { legend: { display: false } },
            scales: {
              y: { beginAtZero: false, suggestedMin: 0, suggestedMax: 100 },
            },
          },
        });

        const select = document.getElementById("semesterSelectChart");
        select.innerHTML = "";
        semesters.forEach((sem) => {
          const opt = document.createElement("option");
          opt.value = sem.id;
          opt.innerText = sem.name;
          select.appendChild(opt);
        });

        updateSemesterChart();
      }

      function updateSemesterChart() {
        const select = document.getElementById("semesterSelectChart");
        const semester = semesters.find((s) => s.id === select.value);
        if (!semester) return;

        const validSubjects = semester.subjects.filter((sub) => {
          let val = parseFloat(sub.grade);
          return !isNaN(val) && val >= 0 && val <= 100 && sub.grade !== "";
        });

        const ctx = document.getElementById("semesterChart").getContext("2d");
        if (semesterChartInstance) semesterChartInstance.destroy();
        semesterChartInstance = new Chart(ctx, {
          type: "bar",
          data: {
            labels: validSubjects.map((sub) => sub.name || "Tanpa Nama"),
            datasets: [
              {
                label: "Nilai",
                data: validSubjects.map((sub) => parseFloat(sub.grade)),
                backgroundColor: "#9D4EDD",
                borderRadius: 6,
              },
            ],
          },
          options: {
            responsive: true,
            plugins: { legend: { display: false } },
            scales: { y: { beginAtZero: true, max: 100 } },
          },
        });
      }

      function toggleView() {
        const inputView = document.getElementById("inputView");
        const summaryView = document.getElementById("summaryView");
        const navBtn = document.getElementById("navBtn");

        if (currentView === "input") {
          currentView = "summary";
          inputView.classList.remove("active");
          summaryView.classList.add("active");
          navBtn.innerHTML = `<svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg> Kembali`;
          navBtn.classList.replace("btn-primary", "btn-secondary");
          renderSummaryView();
        } else {
          currentView = "input";
          summaryView.classList.remove("active");
          inputView.classList.add("active");
          navBtn.innerHTML = `<svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg> Lihat Summary`;
          navBtn.classList.replace("btn-secondary", "btn-primary");
        }
      }

      init();
    </script>
  </body>
</html>
